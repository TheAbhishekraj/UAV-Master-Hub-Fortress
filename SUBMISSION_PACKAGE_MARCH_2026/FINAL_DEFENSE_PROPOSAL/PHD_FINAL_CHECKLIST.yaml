# A* Path Planning Math Formulation
math_formulations:
  a_star: "f(n) = g(n) + h(n)"
  description: >
    Where f(n) is the total estimated cost from start to goal through node n,
    g(n) is the exact cost from start to node n,
    h(n) is the heuristic estimate from n to goal (Manhattan distance on occupancy grid).
  implementation: "path_planner.py — 40×40 cell grid at 0.5m/cell, 44-cell optimal path"

  es_ekf_correction: "δx⁺ = δx⁻ + K(z - H·δx⁻), q ← q ⊗ δq(δφ)"
  description_ekf: >
    Error-State EKF correction on SO(3) — error state injection into nominal quaternion.
    Eliminates Gimbal Lock. Z-variance target: < 0.05m during GPS denial.

